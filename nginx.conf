server {
    listen 80;
    server_name localhost;

    # Prevent Nginx from stripping the port (8080) when redirecting
    absolute_redirect off;
    port_in_redirect off;
    server_name_in_redirect off;

    # Redirect root to the subpath (using 302 to avoid browser caching issues)
    location = / {
        return 302 /ClassManager-microsite/;
    }

    # Serve the app from the subpath
    location /ClassManager-microsite/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /ClassManager-microsite/index.html;
    }

    # Handle cases where the trailing slash might be missing
    location = /ClassManager-microsite {
        return 302 /ClassManager-microsite/;
    }
}
